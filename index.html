<!DOCTYPE html>
<html lang="ku" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>WLAT SHADE — Pergola Kesim Hesabı</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Zain:wght@400;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'lg': '1024px',
          },
          fontFamily: {
            'system': ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'system-ui', 'sans-serif'],
            'kurd': ['Zain', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          colors: {
            'accent': '#9A0D37',
          },
        }
      }
    }
  </script>

  <!-- React & ReactDOM - Production builds -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
    }

    :root {
      --text: #f0e8ec;
      --muted: rgba(240, 232, 236, 0.44);
      --sys: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --krd: 'Zain', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --accent: #9A0D37;
    }

    body {
      font-family: var(--sys);
      background: #070209;
      color: var(--text);
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    /* Background with mesh gradient animation */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #070209;
      overflow: hidden;
    }

    .bg-wrap::before {
      content: '';
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse 68% 50% at 18% 8%, rgba(154, 13, 55, 0.60) 0%, transparent 52%),
        radial-gradient(ellipse 45% 55% at 88% 88%, rgba(90, 5, 32, 0.52) 0%, transparent 52%),
        radial-gradient(ellipse 38% 42% at 58% 48%, rgba(40, 8, 30, 0.38) 0%, transparent 58%),
        radial-gradient(ellipse 55% 30% at 80% 12%, rgba(60, 0, 40, 0.28) 0%, transparent 55%),
        radial-gradient(ellipse 30% 50% at 5% 70%, rgba(120, 10, 45, 0.22) 0%, transparent 55%);
      filter: blur(48px);
      animation: meshDrift 22s ease-in-out infinite alternate;
    }

    .bg-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 25% 35% at 72% 18%, rgba(154, 13, 55, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse 20% 28% at 12% 85%, rgba(160, 15, 60, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse 30% 20% at 50% 95%, rgba(80, 5, 40, 0.20) 0%, transparent 55%);
      filter: blur(28px);
      animation: meshDrift2 28s ease-in-out infinite alternate;
    }

    @keyframes meshDrift {
      0% { transform: translate(0%, 0%) scale(1) rotate(0deg); }
      25% { transform: translate(3%, 5%) scale(1.03) rotate(1.5deg); }
      50% { transform: translate(-4%, 3%) scale(0.97) rotate(-1deg); }
      75% { transform: translate(2%, -4%) scale(1.02) rotate(2deg); }
      100% { transform: translate(-2%, 2%) scale(1.04) rotate(-0.5deg); }
    }

    @keyframes meshDrift2 {
      0% { transform: translate(0%, 0%) scale(1); opacity: 0.7; }
      33% { transform: translate(-5%, 4%) scale(1.05); opacity: 1; }
      66% { transform: translate(4%, -3%) scale(0.96); opacity: 0.85; }
      100% { transform: translate(2%, 5%) scale(1.03); opacity: 0.9; }
    }

    .scroll-root {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    input, button {
      -webkit-tap-highlight-color: transparent;
    }

    .rbrow {
      display: flex;
      gap: 7px;
    }

    .rb {
      flex: 1;
      padding: 9px 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 11px;
      background: rgba(0, 0, 0, 0.22);
      color: var(--muted);
      font-family: var(--sys);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }

    .rb.on {
      border-color: #9A0D37;
      background: rgba(154, 13, 55, 0.16);
      color: white;
    }

    .cbtn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #9A0D37 0%, #c01548 50%, #9A0D37 100%);
      background-size: 200%;
      color: white;
      font-family: var(--sys);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      box-shadow: 0 6px 24px rgba(154, 13, 55, 0.42);
      animation: shimmer 4s ease infinite;
      transition: transform 0.1s ease;
    }

    .cbtn:active {
      transform: scale(0.98);
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0%; }
      50% { background-position: 100%; }
    }

    .pbtn {
      padding: 9px 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      color: var(--text);
      font-family: var(--sys);
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.22s ease;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.09);
    }

    .pbtn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(154, 13, 55, 0.42);
    }

    .pbtn:active {
      transform: scale(0.96);
    }

    .chips {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(154, 13, 55, 0.12);
      border: 1px solid rgba(154, 13, 55, 0.26);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(240, 232, 236, 0.72);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: var(--sys);
    }

    #res-anchor {
      scroll-margin-top: 16px;
    }

    .psh {
      display: none;
    }

    @media print {
      .no-print {
        display: none !important;
      }
      body {
        background: white !important;
        color: black !important;
      }
      .bg-wrap {
        display: none !important;
      }
      .psh {
        display: block !important;
        padding: 24px;
        font-family: Arial, sans-serif;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Safe framer motion import
    const { useState, useEffect } = React;
    
    let motion, AnimatePresence, useSpring, useTransform;
    
    if (typeof window !== 'undefined' && window.framerMotion) {
      motion = window.framerMotion.motion;
      AnimatePresence = window.framerMotion.AnimatePresence;
      useSpring = window.framerMotion.useSpring;
      useTransform = window.framerMotion.useTransform;
    } else {
      motion = {
        div: ({ children, ...props }) => <div {...props}>{children}</div>,
        button: ({ children, ...props }) => <button {...props}>{children}</button>,
        span: ({ children, ...props }) => <span {...props}>{children}</span>
      };
      AnimatePresence = ({ children }) => <>{children}</>;
      useSpring = () => ({ set: () => {} });
      useTransform = () => ({});
    }

    // ─── CALCULATION ENGINE ───────────────────────────────────────────────────
    function calculate({ system, rails, cephe, acilim }) {
      const c = Number(cephe);
      const a = Number(acilim);
      const n = Number(rails);
      
      if (!c || !a || isNaN(c) || isNaN(a) || c < 100 || a < 100) return null;

      const rayLen = a - 220;
      const rayQty = n;
      const rayCode = system === "110" ? "2001" : "2052";
      const rayProfile = system === "70" ? "70×150" : system === "90" ? "90×150" : "110×150";

      const olukLen = c + 150;
      const olukCode = system === "110" ? "2078" : "2770";
      const olukProfile = system === "110" ? "152×150" : "145×135";

      const motorLen = c;

      const dikmeLen = 3000;
      const dikmeQty = n;
      const dikmeCode = system === "70" && n === 2 ? "6565" : "2111";
      const dikmeProfile = system === "110" ? "110×145" : "100×100";
      const dikmeName = system === "70" ? "DİKME" : "AYAK";

      let trapLen, trapQty;
      if (system === "70") {
        if (n === 2) { trapLen = (rayLen - 70) / 2; trapQty = 1; }
        else if (n === 3) { trapLen = c / 2 - 105; trapQty = 2; }
        else { trapLen = c / 3 - 93.33; trapQty = 3; }
      } else if (system === "90") {
        if (n === 2) { trapLen = (a - 730) / 2; trapQty = 1; }
        else if (n === 3) { trapLen = c / 2 - 135; trapQty = 2; }
        else { trapLen = c / 3 - 120; trapQty = 3; }
      } else {
        if (n === 2) { trapLen = c - 180; trapQty = 2; }
        else if (n === 3) { trapLen = c / 2 - 135; trapQty = 2; }
        else { trapLen = c / 3 - 120; trapQty = 3; }
      }

      const kornisOffset = system === "70" ? 20 : 40;
      const inceLen = trapLen + kornisOffset;
      const kalinLen = inceLen;
      const kalinQty = 2 * (n - 1);

      const cadirBaseOffset = system === "70" ? 20 : 40;
      const cadirC = c - (cadirBaseOffset + 4 * n);
      const cadirA = a - 170;

      const pitches = { "70": 282, "90": 254, "110": 204.6 };
      const inceChita = cadirC / pitches[system];
      const kalinChita = 2;

      return {
        ray: { len: Math.round(rayLen), qty: rayQty, code: rayCode, profile: rayProfile, name: "RAY" },
        oluk: { len: Math.round(olukLen), qty: 1, code: olukCode, profile: olukProfile, name: "OLUK" },
        motor: { len: Math.round(motorLen), qty: 1, code: "5312", profile: "", name: "MOTOR BORUSU" },
        dikme: { len: dikmeLen, qty: dikmeQty, code: dikmeCode, profile: dikmeProfile, name: dikmeName },
        trapez: { len: Math.round(trapLen), qty: trapQty, code: "37025", profile: "", name: "TRAPEZ PROFİLİ" },
        inceKornis: { len: Math.round(inceLen), qty: inceChita, code: "2653", profile: "", name: "İNCE KORNİŞ" },
        kalinKornis: { len: Math.round(kalinLen), qty: kalinQty, code: "37216", profile: "", name: "KALIN KORNİŞ" },
        cadir: {
          cephe: Math.round(cadirC),
          acilim: Math.round(cadirA),
          inceChita: inceChita,
          kalinChita,
        },
      };
    }

    // ─── ANIMATED NUMBER ─────────────────────────────────────────────────────
    function AnimNum({ value, decimals = 0 }) {
      const [displayValue, setDisplayValue] = useState("0");
      useEffect(() => {
        const num = Number(value) || 0;
        if (decimals > 0) {
          setDisplayValue(num.toFixed(decimals));
        } else {
          setDisplayValue(Math.round(num).toLocaleString());
        }
      }, [value, decimals]);
      return <span>{displayValue}</span>;
    }

    // ─── IMAGE SLOT ──────────────────────────────────────────────────────────
    function ImgSlot({ src }) {
      return (
        <div className="w-20 h-14 flex-shrink-0 rounded-xl border border-accent/30 bg-black/30 overflow-hidden relative shadow-[0_2px_14px_rgba(154,13,55,0.12)] flex items-center justify-center">
          <div className="w-[76%] h-[70%] border-2 border-dashed border-accent/40 rounded-lg" />
          <div className="absolute inset-0 bg-gradient-radial from-transparent via-transparent to-black/50 pointer-events-none" />
        </div>
      );
    }

    // ─── COLOR SWATCH ────────────────────────────────────────────────────────
    function Swatch({ color }) {
      const isNamed = color && /^[a-zA-Z#]/.test(color.trim());
      return (
        <span className="inline-block w-2.5 h-2.5 rounded-full border border-white/30 flex-shrink-0 align-middle"
          style={{ background: isNamed ? color : "rgba(154,13,55,0.5)" }}
        />
      );
    }

    // ─── RESULT CARD ─────────────────────────────────────────────────────────
    function ResultCard({ label, len, qty, code, isFractional }) {
      return (
        <div className="flex items-center gap-3 bg-accent/10 border border-accent/20 rounded-2xl p-3 mb-2 backdrop-blur-lg">
          <ImgSlot />
          <div className="flex-1 min-w-0">
            <div className="text-xs font-semibold text-white tracking-wide mb-0.5 truncate font-system">
              {label}
            </div>
            <div className="text-[9.5px] text-white/30 tracking-wider mb-1 font-system">
              #{code}
            </div>
            <div className="flex items-center gap-2">
              <div className="flex items-baseline gap-1">
                <span className="text-xl md:text-2xl font-bold text-white font-system">
                  <AnimNum value={Math.round(Number(len))} />
                </span>
                <span className="text-[9px] text-white/40 font-system">mm</span>
              </div>
              <span className="text-accent/50 text-sm">×</span>
              <div>
                <div className="flex items-baseline gap-1">
                  <span className="text-xl md:text-2xl font-bold text-white font-system">
                    {isFractional ? <AnimNum value={qty} decimals={4} /> : <AnimNum value={qty} />}
                  </span>
                  <span className="text-[9px] text-white/40 font-system">adet</span>
                </div>
                <span className="text-[8px] text-white/20 font-kurd">دانە</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── SEGMENT CONTROL ─────────────────────────────────────────────────────
    function SegControl({ options, value, onChange }) {
      return (
        <div className="flex bg-black/40 rounded-xl p-1 gap-1 mb-4">
          {options.map(opt => (
            <button key={opt.value} onClick={() => onChange(opt.value)}
              className={`flex-1 py-2 border-none rounded-lg cursor-pointer font-system text-xs md:text-sm font-semibold transition-all ${
                value === opt.value
                  ? "bg-gradient-to-r from-accent to-[#c01548] text-white shadow-lg shadow-accent/40"
                  : "bg-transparent text-white/40"
              }`}
            >
              {opt.label}
            </button>
          ))}
        </div>
      );
    }

    // ─── NUMBER INPUT ────────────────────────────────────────────────────────
    function NumInput({ label, value, onChange }) {
      return (
        <div className="mb-3">
          <label className="block text-[10px] tracking-[2px] uppercase text-white/50 mb-1 font-system">
            {label}
          </label>
          <div className="relative">
            <input type="number" value={value} placeholder=""
              onChange={e => onChange(e.target.value)}
              className="w-full py-3 pl-4 pr-12 bg-black/40 border border-white/10 rounded-xl text-white font-system text-base outline-none focus:border-accent/50 transition-colors"
            />
            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-white/30 font-system">mm</span>
          </div>
        </div>
      );
    }

    // ─── TEXT INPUT ──────────────────────────────────────────────────────────
    function TxtInput({ label, value, onChange }) {
      return (
        <div className="mb-3">
          <label className="block text-[10px] tracking-[2px] uppercase text-white/50 mb-1 font-system">
            {label}
          </label>
          <input type="text" value={value} placeholder=""
            onChange={e => onChange(e.target.value)}
            className="w-full py-2.5 px-3.5 bg-black/30 border border-white/10 rounded-xl text-white font-system text-sm outline-none focus:border-accent/50 transition-colors"
          />
        </div>
      );
    }

    // ─── DIVIDER ─────────────────────────────────────────────────────────────
    function Divider() {
      return <div className="h-px bg-gradient-to-r from-transparent via-accent/30 to-transparent my-1.5 mb-4" />;
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [system, setSystem] = useState("70");
      const [rails, setRails] = useState("2");
      const [cephe, setCephe] = useState("");
      const [acilim, setAcilim] = useState("");
      const [alColor, setAlColor] = useState("");
      const [fabColor, setFabColor] = useState("");
      const [customer, setCustomer] = useState("");
      const [result, setResult] = useState(null);

      const today = new Date().toLocaleDateString("tr-TR");

      const handleCalc = () => {
        const r = calculate({ system, rails: Number(rails), cephe, acilim });
        setResult(r);
        setTimeout(() => {
          document.getElementById("res-anchor")?.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 120);
      };

      return (
        <>
          <div className="bg-wrap" />
          <div className="scroll-root">
            <div className="max-w-7xl mx-auto px-4 py-5 md:py-8 lg:py-10 no-print">
              {/* Header */}
              <header className="text-center pt-8 pb-6 md:pt-12 md:pb-8 lg:pt-16 lg:pb-10">
                <div>
                  <div className="font-system text-3xl md:text-4xl lg:text-5xl font-bold tracking-[0.2em] mb-2">
                    <span className="text-accent">WLAT</span>{' '}
                    <span className="text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.9)]">
                      SHADE
                    </span>
                  </div>
                  <div className="font-kurd text-xl md:text-2xl lg:text-3xl font-extrabold leading-tight mb-1.5 rtl">
                    <span className="text-accent">حسابکردنی</span>{' '}
                    <span className="text-white">بڕینی پەرگۆلا</span>
                  </div>
                  <div className="text-[10px] text-white/40 tracking-[3.5px] uppercase font-system">
                    Pergola Kesim Hesabı
                  </div>
                  <div className="w-14 h-px bg-gradient-to-r from-transparent via-accent to-transparent mx-auto mt-3.5" />
                </div>
              </header>

              {/* Input Card - Mobile First: single column, Desktop: two columns */}
              <div className="bg-white/5 border border-white/10 rounded-2xl backdrop-blur-xl p-5 md:p-6 lg:p-8 mb-4">
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6">
                  {/* Column 1 */}
                  <div>
                    <div className="text-[10px] tracking-[3px] uppercase text-white/40 mb-3 font-system">سیستەم / Sistem</div>
                    <SegControl
                      value={system}
                      onChange={s => { setSystem(s); setResult(null); }}
                      options={[
                        { value: "70", label: "Ray 70" },
                        { value: "90", label: "Ray 90" },
                        { value: "110", label: "Ray 110" },
                      ]}
                    />

                    <div className="text-[10px] tracking-[3px] uppercase text-white/40 mb-3 font-system">ژمارەی ڕەیل / Ray Sayısı</div>
                    <div className="rbrow mb-4">
                      {["2", "3", "4"].map(r => (
                        <button
                          key={r}
                          className={`rb ${rails === r ? "on" : ""}`}
                          onClick={() => { setRails(r); setResult(null); }}
                        >
                          {r} ڕەیل / Ray
                        </button>
                      ))}
                    </div>

                    <TxtInput label="کریار / Müşteri" value={customer} onChange={setCustomer} />
                  </div>

                  {/* Column 2 */}
                  <div>
                    <NumInput label="ڕوکار / Cephe (mm)" value={cephe} onChange={setCephe} />
                    <NumInput label="کرانەوە / Açılım (mm)" value={acilim} onChange={setAcilim} />

                    <Divider />

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <TxtInput label="رەنگی ئەلومنیۆم / Alüminyum" value={alColor} onChange={setAlColor} />
                      <TxtInput label="رەنگی کوماش / Kumaş" value={fabColor} onChange={setFabColor} />
                    </div>
                  </div>
                </div>

                {/* Calculate Button - Full width at bottom */}
                <div className="mt-6 lg:mt-8">
                  <button className="cbtn" onClick={handleCalc}>
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                      <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="white" strokeWidth="1.3" />
                      <rect x="8.5" y="1.5" width="5" height="5" rx="1" stroke="white" strokeWidth="1.3" />
                      <rect x="1.5" y="8.5" width="5" height="5" rx="1" stroke="white" strokeWidth="1.3" />
                      <path d="M11 8.5v6M8.5 11h6" stroke="white" strokeWidth="1.3" strokeLinecap="round" />
                    </svg>
                    حساب بکە / Hesapla
                  </button>
                </div>
              </div>

              {/* Results */}
              {result && (
                <div id="res-anchor" className="mt-6">
                  <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
                    <div className="text-[10px] tracking-[3px] uppercase text-white/40 font-system">ئەنجامەکان / Sonuçlar</div>
                    <button className="pbtn" onClick={() => window.print()}>
                      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                        <path d="M3 5V1h7v4M3 9.5H1V5h11v4.5h-2M3 8h7v4H3z"
                          stroke="currentColor" strokeWidth="1.15" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                      پرینت / Yazdır
                    </button>
                  </div>

                  <div className="chips">
                    <span className="chip">RAY {system}</span>
                    <span className="chip">{rails} ڕەیل</span>
                    <span className="chip">{cephe} × {acilim} mm</span>
                    {alColor && <span className="chip"><Swatch color={alColor} /> {alColor}</span>}
                    {fabColor && <span className="chip"><Swatch color={fabColor} /> {fabColor}</span>}
                    {customer && <span className="chip">{customer}</span>}
                  </div>

                  <div className="text-[9px] tracking-[2.8px] uppercase text-accent/70 mb-3 font-system">
                    ئەلومنیۆم / Alüminyum Profiller
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <ResultCard label={`ڕەیل / RAY ${result.ray.profile}`} code={result.ray.code} len={result.ray.len} qty={result.ray.qty} />
                    <ResultCard label={`ئاوڕۆ / OLUK ${result.oluk.profile}`} code={result.oluk.code} len={result.oluk.len} qty={result.oluk.qty} />
                    <ResultCard label="بۆری مۆتۆر / MOTOR BORUSU" code={result.motor.code} len={result.motor.len} qty={result.motor.qty} />
                    <ResultCard label={`ستوون / ${result.dikme.name} ${result.dikme.profile}`} code={result.dikme.code} len={result.dikme.len} qty={result.dikme.qty} />
                    <ResultCard label="تراپێز / TRAPEZ PROFİLİ" code={result.trapez.code} len={result.trapez.len} qty={result.trapez.qty} />
                    <ResultCard isFractional label="کورنیشی باریک / İNCE KORNİŞ" code={result.inceKornis.code} len={result.inceKornis.len} qty={result.inceKornis.qty} />
                    <ResultCard label="کورنیشی ئەستوور / KALIN KORNİŞ" code={result.kalinKornis.code} len={result.kalinKornis.len} qty={result.kalinKornis.qty} />
                  </div>

                  {/* Çadır Section */}
                  <div className="bg-accent/10 border border-accent/20 rounded-2xl p-4 md:p-5 mt-2">
                    <div className="text-[9.5px] tracking-[2.5px] uppercase text-accent/80 mb-3 font-system">
                      چادر / Çadır Ölçüsü
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-4">
                      <div className="bg-black/30 rounded-xl p-3 text-center">
                        <div className="text-[9px] text-white/50 font-system">ڕوکار / Cephe</div>
                        <div className="text-xl md:text-2xl font-bold"><AnimNum value={result.cadir.cephe} /></div>
                        <div className="text-[9px] text-white/50">mm</div>
                      </div>
                      <div className="bg-black/30 rounded-xl p-3 text-center">
                        <div className="text-[9px] text-white/50">کرانەوە / Açılım</div>
                        <div className="text-xl md:text-2xl font-bold"><AnimNum value={result.cadir.acilim} /></div>
                        <div className="text-[9px] text-white/50">mm</div>
                      </div>
                    </div>
                    <div className="border-t border-accent/20 pt-3">
                      <div className="text-[9px] tracking-[2px] uppercase text-accent/60 mb-2 font-system">
                        چیتا / Çita Sayısı
                      </div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="bg-black/30 rounded-xl p-2.5">
                          <div className="text-[9px] text-white/50">باریک / İnce Çita</div>
                          <div className="text-lg md:text-xl font-bold"><AnimNum value={result.cadir.inceChita} decimals={4} /></div>
                          <div className="text-[8px] text-white/20">دانە</div>
                        </div>
                        <div className="bg-black/30 rounded-xl p-2.5">
                          <div className="text-[9px] text-white/50">ئەستوور / Kalin Çita</div>
                          <div className="text-lg md:text-xl font-bold"><AnimNum value={result.cadir.kalinChita} /></div>
                          <div className="text-[8px] text-white/20">دانە</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Print Sheet */}
          {result && (
            <div className="psh">
              <div className="text-center border-b-2 border-accent pb-3 mb-4">
                <div className="text-2xl font-bold text-accent">WLAT SHADE</div>
                <div className="text-base font-bold mt-1">
                  حسابکردنی بڕینی پەرگۆلا / Pergola Kesim Listesi
                </div>
                <div className="text-xs text-gray-500 mt-1">
                  {customer && <><span>کریار / Müşteri: <b>{customer}</b></span> &nbsp;|&nbsp;</>}
                  بەروار / Tarih: {today}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-1.5 mb-3 text-xs">
                <div><b>سیستەم / Sistem:</b> Ray {system}</div>
                <div><b>ڕەیل / Ray Sayısı:</b> {rails}</div>
                <div><b>ڕوکار / Cephe:</b> {cephe} mm</div>
                <div><b>کرانەوە / Açılım:</b> {acilim} mm</div>
                {alColor && <div><b>ئەلومنیۆم:</b> {alColor}</div>}
                {fabColor && <div><b>کوماش / Kumaş:</b> {fabColor}</div>}
              </div>
              <table className="w-full border-collapse text-xs">
                <thead>
                  <tr className="bg-accent text-white">
                    <th className="p-2 text-left">KALIP NO</th>
                    <th className="p-2 text-left">ÜRÜN ADI / ناوی کاڵا</th>
                    <th className="p-2 text-left">KESİM ÖLÇÜSÜ (mm)</th>
                    <th className="p-2 text-left">ADET / دانە</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    { code: result.ray.code, name: `ڕەیل / RAY ${result.ray.profile}`, len: result.ray.len, qty: result.ray.qty },
                    { code: result.oluk.code, name: `ئاوڕۆ / OLUK ${result.oluk.profile}`, len: result.oluk.len, qty: result.oluk.qty },
                    { code: result.motor.code, name: "بۆری مۆتۆر / MOTOR BORUSU", len: result.motor.len, qty: result.motor.qty },
                    { code: result.dikme.code, name: `ستوون / ${result.dikme.name} ${result.dikme.profile}`, len: result.dikme.len, qty: result.dikme.qty },
                    { code: result.trapez.code, name: "تراپێز / TRAPEZ PROFİLİ", len: result.trapez.len, qty: result.trapez.qty },
                    { code: result.inceKornis.code, name: "کورنیشی باریک / İNCE KORNİŞ", len: result.inceKornis.len, qty: result.inceKornis.qty.toFixed(4) },
                    { code: result.kalinKornis.code, name: "کورنیشی ئەستوور / KALIN KORNİŞ", len: result.kalinKornis.len, qty: result.kalinKornis.qty },
                  ].map((row, i) => (
                    <tr key={i} className={i % 2 === 0 ? "bg-[#fdf7f9]" : "bg-white"}>
                      <td className="p-2 border-b border-gray-200 text-gray-600">{row.code}</td>
                      <td className="p-2 border-b border-gray-200">{row.name}</td>
                      <td className="p-2 border-b border-gray-200 text-right font-bold">{row.len}</td>
                      <td className="p-2 border-b border-gray-200 text-right">{row.qty}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="mt-3 p-2.5 bg-[#fdf0f4] border border-accent rounded-lg text-xs">
                <b>چادر / Çadır:</b>
                {" "}Cephe: <b>{result.cadir.cephe}</b> mm &nbsp;|&nbsp;
                Açılım: <b>{result.cadir.acilim}</b> mm &nbsp;|&nbsp;
                İnce Çita: <b>{result.cadir.inceChita.toFixed(4)}</b> &nbsp;|&nbsp;
                Kalin Çita: <b>{result.cadir.kalinChita}</b>
              </div>
              <div className="mt-4 text-[10px] text-gray-400 text-center">
                WLAT SHADE — Pergola Cutting System · {today}
              </div>
            </div>
          )}
        </>
      );
    }

    // Render app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
